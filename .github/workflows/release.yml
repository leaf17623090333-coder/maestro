name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-gate:
    name: Determine Release Eligibility
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Check release trigger
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          EXPECTED_RELEASE_SUBJECT: "chore(release): v${{ steps.version.outputs.version }}"
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual release run requested."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$HEAD_COMMIT_MESSAGE" = "$EXPECTED_RELEASE_SUBJECT" ]; then
            echo "Release commit detected on main."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Non-release commit detected; skipping publish jobs."
          echo "should_release=false" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify Release Candidate
    needs: release-gate
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check feature boundaries
        run: bun run check:boundaries
      - name: Run test suite
        run: bun run test
      - name: Build compiled binary
        run: bun run build
      - name: Verify compiled binary version
        run: ./dist/maestro --version
      - name: Smoke-test Mission Control renderer
        run: ./dist/maestro mission-control --render-check --size 120x40

  build-assets:
    name: Build ${{ matrix.asset }}
    needs:
      - release-gate
      - verify
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset: maestro-linux-x64
          - runner: ubuntu-24.04-arm
            asset: maestro-linux-arm64
          - runner: macos-15-intel
            asset: maestro-darwin-x64
          - runner: macos-15
            asset: maestro-darwin-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build release asset
        run: bun scripts/build.ts
      - name: Verify built asset version
        run: ./dist/maestro --version
      - name: Stage named release asset
        run: cp dist/maestro dist/${{ matrix.asset }}
      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish Release
    needs:
      - release-gate
      - build-assets
    if: needs.release-gate.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: maestro-*
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release-gate.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG_NAME" \
            --target "$TARGET_SHA" \
            --generate-notes \
            dist/*
