<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro - How Work Flows</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #57534e;
      --rule: rgba(28, 25, 23, 0.12);
    }
    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Geist', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }
    .frame { width: min(1200px, 100%); }
    .eyebrow {
      margin-bottom: 8px;
      color: var(--muted);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin-bottom: 24px;
      color: var(--ink);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 3vw, 44px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    p {
      max-width: 760px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .diagram {
      overflow-x: auto;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--paper-2);
      padding: 20px;
    }
    svg {
      display: block;
      width: 100%;
      min-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>How Maestro work flows</h1>
    <p>
      This is the main mission loop: create the mission, optionally inspect the feature brief,
      launch a fresh handoff, then push status and validation back into the same local state.
    </p>
    <div class="diagram">
      <svg width="1000" height="860" viewBox="0 0 1000 860" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
        <title id="title">How Maestro work flows</title>
        <desc id="desc">Flowchart showing the main mission execution loop in Maestro: create a mission, approve it, optionally inspect the feature prompt, launch a handoff, run the agent, update status and validation, then seal the milestone.</desc>
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="1000" height="860" fill="#faf7f2"/>
        <rect width="1000" height="860" fill="url(#dots)" opacity="0.55"/>

        <line x1="500" y1="92" x2="500" y2="128" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="192" x2="500" y2="228" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="292" x2="500" y2="328" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="580" y1="384" x2="700" y2="384" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="436" x2="500" y2="488" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <polyline points="812 448,812 520,648 520" fill="none" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="552" x2="500" y2="588" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
        <line x1="500" y1="652" x2="500" y2="688" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="752" x2="500" y2="780" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <rect x="624" y="366" width="32" height="12" rx="2" fill="#faf7f2"/>
        <text x="640" y="375" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">YES</text>

        <rect x="512" y="456" width="24" height="12" rx="2" fill="#faf7f2"/>
        <text x="524" y="465" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NO</text>

        <rect x="412" y="48" width="176" height="44" rx="20" fill="#faf7f2"/>
        <rect x="412" y="48" width="176" height="44" rx="20" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="500" y="74" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Start in repo</text>

        <rect x="360" y="128" width="280" height="64" rx="6" fill="#faf7f2"/>
        <rect x="360" y="128" width="280" height="64" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <rect x="368" y="136" width="36" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="386" y="145" fill="#1c1917" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">PLAN</text>
        <text x="500" y="158" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Write plan.json and create mission</text>
        <text x="500" y="176" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">maestro init, mission create --file plan.json</text>

        <rect x="388" y="228" width="224" height="64" rx="6" fill="#faf7f2"/>
        <rect x="388" y="228" width="224" height="64" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
        <rect x="396" y="236" width="40" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.50)" stroke-width="0.8"/>
        <text x="416" y="245" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
        <text x="500" y="258" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Approve the mission</text>
        <text x="500" y="276" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">maestro mission approve &lt;mission-id&gt;</text>

        <polygon points="500 328,580 384,500 440,420 384" fill="rgba(28,25,23,0.02)" stroke="#57534e" stroke-width="1"/>
        <text x="500" y="380" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Inspect prompt first?</text>
        <text x="500" y="398" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">optional feature prompt step</text>

        <rect x="700" y="352" width="224" height="96" rx="6" fill="#faf7f2"/>
        <rect x="700" y="352" width="224" height="96" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
        <rect x="708" y="360" width="44" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.50)" stroke-width="0.8"/>
        <text x="730" y="369" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">BRIEF</text>
        <text x="812" y="386" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Inspect current feature context</text>
        <text x="812" y="404" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">maestro feature prompt &lt;feature-id&gt;</text>
        <text x="812" y="420" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">--mission &lt;mission-id&gt; --out worker-prompt.md</text>

        <rect x="352" y="488" width="296" height="64" rx="6" fill="#faf7f2"/>
        <rect x="352" y="488" width="296" height="64" rx="6" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <rect x="360" y="496" width="44" height="12" rx="2" fill="transparent" stroke="rgba(181,82,58,0.50)" stroke-width="0.8"/>
        <text x="382" y="505" fill="#b5523a" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LAUNCH</text>
        <text x="500" y="518" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Launch a fresh handoff</text>
        <text x="500" y="536" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">maestro handoff "Implement auth-impl" --provider codex</text>

        <rect x="352" y="588" width="296" height="64" rx="6" fill="#faf7f2"/>
        <rect x="352" y="588" width="296" height="64" rx="6" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <rect x="360" y="596" width="40" height="12" rx="2" fill="transparent" stroke="rgba(28,25,23,0.40)" stroke-width="0.8"/>
        <text x="380" y="605" fill="#1c1917" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">RUN</text>
        <text x="500" y="618" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Agent works from the persisted brief</text>
        <text x="500" y="636" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">fresh Codex or Claude session, same repo state</text>

        <rect x="352" y="688" width="296" height="64" rx="6" fill="#faf7f2"/>
        <rect x="352" y="688" width="296" height="64" rx="6" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
        <rect x="360" y="696" width="44" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.50)" stroke-width="0.8"/>
        <text x="382" y="705" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">CHECK</text>
        <text x="500" y="718" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Update progress and validation</text>
        <text x="500" y="736" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">feature update, validate update, checkpoint save</text>

        <rect x="392" y="780" width="216" height="44" rx="20" fill="#faf7f2"/>
        <rect x="392" y="780" width="216" height="44" rx="20" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="500" y="806" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Seal the milestone</text>

        <line x1="40" y1="832" x2="960" y2="832" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
        <text x="40" y="848" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="112" y="840" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="132" y="848" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">handoff launch pivot</text>

        <rect x="264" y="840" width="14" height="10" rx="2" fill="#ffffff" stroke="#1c1917" stroke-width="1"/>
        <text x="284" y="848" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">main execution step</text>

        <rect x="420" y="840" width="14" height="10" rx="2" fill="rgba(28,25,23,0.05)" stroke="#57534e" stroke-width="1"/>
        <text x="440" y="848" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">state or validation step</text>

        <line x1="624" y1="846" x2="652" y2="846" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="660" y="848" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">control flow</text>
      </svg>
    </div>
  </main>
</body>
</html>
