<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro - Launch Status Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #57534e;
      --rule: rgba(28, 25, 23, 0.12);
    }
    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Geist', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }
    .frame { width: min(1200px, 100%); }
    .eyebrow {
      margin-bottom: 8px;
      color: var(--muted);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin-bottom: 24px;
      color: var(--ink);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 3vw, 44px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    p {
      max-width: 760px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .diagram {
      overflow-x: auto;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--paper-2);
      padding: 20px;
    }
    svg {
      display: block;
      width: 100%;
      min-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Flowchart · Diagram Design</p>
    <h1>Launch status flow</h1>
    <p>
      Detached launches stop at <code>launched</code>. Wait mode keeps the command open and
      records a terminal outcome after the provider exits.
    </p>
    <div class="diagram">
      <svg width="1000" height="620" viewBox="0 0 1000 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
        <title id="title">Maestro handoff launch status flow</title>
        <desc id="desc">Flowchart showing how Maestro records handoff launch status. Without wait mode, the handoff returns launched. With wait mode, the final status becomes completed or failed depending on the provider exit.</desc>
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="1000" height="620" fill="#faf7f2"/>
        <rect width="1000" height="620" fill="url(#dots)" opacity="0.55"/>

        <line x1="500" y1="92" x2="500" y2="124" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="380" y1="172" x2="300" y2="172" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="500" y1="220" x2="500" y2="276" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <line x1="620" y1="324" x2="680" y2="324" stroke="#b5523a" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
        <line x1="500" y1="372" x2="500" y2="440" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <rect x="328" y="154" width="24" height="12" rx="2" fill="#faf7f2"/>
        <text x="340" y="163" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NO</text>

        <rect x="512" y="236" width="32" height="12" rx="2" fill="#faf7f2"/>
        <text x="528" y="245" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">YES</text>

        <rect x="632" y="306" width="32" height="12" rx="2" fill="#faf7f2"/>
        <text x="648" y="315" fill="#b5523a" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">YES</text>

        <rect x="512" y="388" width="24" height="12" rx="2" fill="#faf7f2"/>
        <text x="524" y="397" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">NO</text>

        <rect x="360" y="48" width="280" height="44" rx="20" fill="#faf7f2"/>
        <rect x="360" y="48" width="280" height="44" rx="20" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="500" y="74" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">maestro handoff ...</text>

        <polygon points="500 124,620 172,500 220,380 172" fill="rgba(28,25,23,0.02)" stroke="#57534e" stroke-width="1"/>
        <text x="500" y="168" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Was --wait used?</text>
        <text x="500" y="186" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">detached return or block for exit</text>

        <rect x="80" y="150" width="220" height="44" rx="20" fill="#faf7f2"/>
        <rect x="80" y="150" width="220" height="44" rx="20" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="190" y="176" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">status: launched</text>

        <polygon points="500 276,620 324,500 372,380 324" fill="rgba(28,25,23,0.02)" stroke="#57534e" stroke-width="1"/>
        <text x="500" y="320" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Provider exited cleanly?</text>
        <text x="500" y="338" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">foreground wait path only</text>

        <rect x="680" y="302" width="240" height="44" rx="20" fill="#faf7f2"/>
        <rect x="680" y="302" width="240" height="44" rx="20" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="800" y="328" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">status: completed</text>

        <rect x="388" y="440" width="224" height="44" rx="20" fill="#faf7f2"/>
        <rect x="388" y="440" width="224" height="44" rx="20" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="500" y="466" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">status: failed</text>

        <line x1="40" y1="560" x2="960" y2="560" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
        <text x="40" y="576" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="112" y="568" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="132" y="576" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">happy-path waited completion</text>

        <rect x="324" y="568" width="14" height="10" rx="2" fill="rgba(28,25,23,0.03)" stroke="rgba(28,25,23,0.30)" stroke-width="1"/>
        <text x="344" y="576" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">recorded launch state</text>

        <line x1="560" y1="574" x2="588" y2="574" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="596" y="576" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">decision flow</text>
      </svg>
    </div>
  </main>
</body>
</html>
