<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro - Architecture Layers</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #57534e;
      --rule: rgba(28, 25, 23, 0.12);
    }
    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Geist', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }
    .frame { width: min(1200px, 100%); }
    .eyebrow {
      margin-bottom: 8px;
      color: var(--muted);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin-bottom: 24px;
      color: var(--ink);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 3vw, 44px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }
    p {
      max-width: 760px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .diagram {
      overflow-x: auto;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--paper-2);
      padding: 20px;
    }
    svg {
      display: block;
      width: 100%;
      min-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Layer Stack · Diagram Design</p>
    <h1>Maestro architecture layers</h1>
    <p>
      Read this top to bottom: thin CLI entry, one composition root, feature behavior,
      domain contracts, adapters, then the local state and read-only projections underneath.
    </p>
    <div class="diagram">
      <svg width="1000" height="700" viewBox="0 0 1000 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
        <title id="title">Maestro architecture layers</title>
        <desc id="desc">Layer stack diagram showing the Maestro code architecture from CLI entrypoint, composition root, feature behavior, domain contracts, adapters, and local state plus Mission Control projections.</desc>
        <defs>
          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.9" fill="rgba(28,25,23,0.10)"/>
          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
        </defs>

        <rect width="1000" height="700" fill="#faf7f2"/>
        <rect width="1000" height="700" fill="url(#dots)" opacity="0.55"/>

        <line x1="84" y1="112" x2="84" y2="520" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="32" y="104" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">ENTRY</text>
        <text x="28" y="540" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">STATE</text>

        <rect x="140" y="96" width="760" height="72" rx="8" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="176" y="140" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L1</text>
        <text x="304" y="140" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">CLI entry and command registration</text>
        <text x="856" y="140" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">src/index.ts keeps command wiring thin</text>

        <rect x="140" y="168" width="760" height="72" rx="8" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="176" y="212" fill="#b5523a" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L2</text>
        <text x="304" y="212" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">Composition root</text>
        <text x="856" y="212" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">src/services.ts wires features and adapters</text>

        <rect x="140" y="240" width="760" height="72" rx="8" fill="#f2ede4" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="176" y="284" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L3</text>
        <text x="304" y="284" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">Feature commands and use cases</text>
        <text x="856" y="284" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">mission, task, handoff, memory, reply, bundle</text>

        <rect x="140" y="312" width="760" height="72" rx="8" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="176" y="356" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L4</text>
        <text x="304" y="356" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">Domain models and ports</text>
        <text x="856" y="356" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">rules, validators, contracts, public feature surfaces</text>

        <rect x="140" y="384" width="760" height="72" rx="8" fill="#f2ede4" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="176" y="428" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L5</text>
        <text x="304" y="428" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">Adapters</text>
        <text x="856" y="428" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">filesystem, git, config, session, launch orchestration</text>

        <rect x="140" y="456" width="760" height="72" rx="8" fill="#faf7f2" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="176" y="500" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" letter-spacing="0.12em">L6</text>
        <text x="304" y="500" fill="#1c1917" font-size="16" font-weight="600" font-family="'Geist', sans-serif">Local state and read-only projections</text>
        <text x="856" y="500" fill="#57534e" font-size="10" font-family="'Geist Mono', monospace" text-anchor="end">.maestro plus Mission Control snapshots and previews</text>

        <line x1="40" y1="612" x2="960" y2="612" stroke="rgba(28,25,23,0.12)" stroke-width="0.8"/>
        <text x="40" y="628" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

        <rect x="112" y="620" width="14" height="10" rx="2" fill="rgba(181,82,58,0.08)" stroke="#b5523a" stroke-width="1"/>
        <text x="132" y="628" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">focal seam under discussion</text>

        <rect x="320" y="620" width="14" height="10" rx="2" fill="#f2ede4" stroke="rgba(28,25,23,0.12)" stroke-width="1"/>
        <text x="340" y="628" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">alternating abstraction band</text>

        <line x1="592" y1="626" x2="620" y2="626" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>
        <text x="628" y="628" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">dependency direction</text>
      </svg>
    </div>
  </main>
</body>
</html>
