<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro · System Overview</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper: #faf7f2;
      --paper-2: #f2ede4;
      --ink: #1c1917;
      --muted: #57534e;
      --soft: #78716c;
      --rule: rgba(28, 25, 23, 0.12);
      --rule-solid: rgba(120, 113, 108, 0.25);
      --accent: #b5523a;
      --accent-tint: rgba(181, 82, 58, 0.08);
    }

    body {
      min-height: 100vh;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Geist', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
    }

    .frame {
      width: min(1200px, 100%);
    }

    .eyebrow {
      margin-bottom: 8px;
      color: var(--muted);
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin-bottom: 24px;
      color: var(--ink);
      font-family: 'Instrument Serif', serif;
      font-size: clamp(32px, 3vw, 44px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    p {
      max-width: 760px;
      margin-bottom: 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }

    .diagram {
      overflow-x: auto;
      border: 1px solid var(--rule);
      border-radius: 8px;
      background: var(--paper-2);
      padding: 20px;
    }

    svg {
      display: block;
      width: 100%;
      min-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="eyebrow">Architecture · Diagram Design</p>
    <h1>Maestro system overview</h1>
    <p>
      Maestro sits between the operator, fresh agent sessions, and the local filesystem.
      The CLI is the only writer in the middle; Mission Control stays read-only and projects the same on-disk state.
    </p>
    <div class="diagram">
      <svg width="1000" height="560" viewBox="0 0 1000 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">

        <desc id="desc">Architecture diagram showing the human operator and agent terminals using the Maestro CLI, which reads and writes local repo tools, project state in .maestro, user defaults in ~/.maestro, and exposes Mission Control as a read-only view.</desc>

          <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">

          </pattern>
          <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#57534e"/>
          </marker>
          <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#b5523a"/>
          </marker>
        </defs>

        <rect width="1000" height="560" fill="#faf7f2"/>
        <rect width="1000" height="560" fill="url(#dots)" opacity="0.55"/>

        <rect x="24" y="132" width="192" height="256" rx="8" fill="transparent" stroke="rgba(120,113,108,0.25)" stroke-width="1" stroke-dasharray="4 4"/>

        <text x="96" y="136" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">OPERATOR SURFACE</text>

        <rect x="236" y="84" width="740" height="388" rx="8" fill="transparent" stroke="rgba(120,113,108,0.25)" stroke-width="1" stroke-dasharray="4 4"/>

        <text x="324" y="88" fill="#78716c" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">LOCAL WORKSPACE</text>

        <line x1="192" y1="212" x2="260" y2="252" stroke="#57534e" stroke-width="1.2" marker-end="url(#arrow)"/>

        <rect x="208" y="296" width="28" height="12" rx="2" fill="#faf7f2"/>
        <text x="222" y="305" fill="#57534e" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle">RUN</text>

        <rect x="448" y="196" width="68" height="12" rx="2" fill="#faf7f2"/>

        <text x="350" y="270" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Maestro CLI</text>

        <text x="600" y="178" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Repo + local tools</text>
        <text x="600" y="196" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">git · config · filesystem · terminal</text>

        <rect x="500" y="228" width="200" height="96" rx="6" fill="#faf7f2"/>

        <text x="528" y="245" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">STATE</text>
        <text x="600" y="270" fill="#1c1917" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Project state</text>
        <text x="600" y="288" fill="#57534e" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">.maestro/ missions · tasks · launches</text>

        <rect x="500" y="356" width="200" height="80" rx="6" fill="#faf7f2"/>

        <rect x="508" y="364" width="40" height="12" rx="2" fill="transparent" stroke="rgba(87,83,78,0.50)" stroke-width="0.8"/>
        <text x="528" y="373" fill="#57534e" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">HOME</text>

        <text x="796" y="532" fill="#57534e" font-size="8.5" font-family="'Geist', sans-serif">Shared state write path</text>
      </svg>
    </div>
  </main>
</body>
</html>
